name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install mcp-server dependencies
        run: npm ci
        working-directory: mcp-server

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx vite build

      - name: Test
        run: npm test
